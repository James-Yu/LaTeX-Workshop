name: TeX Live on macOS
env:
  cache-version: v12
  TEXLIVE_KEY_FINGERPRINT: C78B82D8C79512F79CC0D7C80D5E5D9106BAB6BC
on: [push, pull_request]

permissions:
  contents: read

jobs:
  macosx:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Set up PATH
      run: |
        echo "/Users/runner/texlive/bin/x86_64-darwin" >> $GITHUB_PATH
        echo "/Users/runner/texlive/bin/universal-darwin" >> $GITHUB_PATH
    - name: Cache TeX Live
      id: cache-texlive
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
      with:
        path: /Users/runner/texlive
        key: ${{ env.cache-version }}-${{ runner.os }}-texlive-essential
        restore-keys: |
          ${{ env.cache-version }}-${{ runner.os }}-texlive-essential
    - name: Download and verify install-tl archive
      run: |
        curl --fail --show-error --silent --location --proto '=https' --tlsv1.2 -O https://mirror.ctan.org/systems/texlive/tlnet/install-tl-unx.tar.gz
        curl --fail --show-error --silent --location --proto '=https' --tlsv1.2 -O https://mirror.ctan.org/systems/texlive/tlnet/install-tl-unx.tar.gz.sha512
        curl --fail --show-error --silent --location --proto '=https' --tlsv1.2 -O https://mirror.ctan.org/systems/texlive/tlnet/install-tl-unx.tar.gz.sha512.asc
        curl --fail --show-error --silent --location --proto '=https' --tlsv1.2 -O https://tug.org/texlive/files/texlive.asc
        test "$(gpg --show-keys --with-colons texlive.asc | awk -F: '/^fpr:/ {print $10; exit}')" = "$TEXLIVE_KEY_FINGERPRINT"
        shasum -a 512 -c install-tl-unx.tar.gz.sha512
        export GNUPGHOME="$(mktemp -d)"
        gpg --batch --import texlive.asc
        gpg --batch --verify install-tl-unx.tar.gz.sha512.asc install-tl-unx.tar.gz.sha512
        tar -xzf install-tl-unx.tar.gz
        INSTALL_DIR="$(find . -maxdepth 1 -type d -name 'install-tl-*' | head -n 1)"
        test -n "$INSTALL_DIR"
        mv "$INSTALL_DIR" install-tl-dir
        rm -rf "$GNUPGHOME"
      if: steps.cache-texlive.outputs.cache-hit != 'true'
    - name: Run install-tl
      run: |
        install-tl-dir/install-tl --profile test/config/texlive_mac.profile
      if: steps.cache-texlive.outputs.cache-hit != 'true'
    - name: Run tlmgr install
      run: |
        tlmgr install collection-latex
        tlmgr install import subfiles latexmk makeindex
        tlmgr install chktex lacheck latexindent
      if: steps.cache-texlive.outputs.cache-hit != 'true'
    - name: Create latexindent wrapper
      run: |
        SCRIPT_PATH="$(kpsewhich latexindent.pl)"
        test -n "$SCRIPT_PATH"
        TARGET_DIR="/Users/runner/texlive/bin/universal-darwin"
        [ -d /Users/runner/texlive/bin/x86_64-darwin/ ] && TARGET_DIR="/Users/runner/texlive/bin/x86_64-darwin"
        printf '%s\n' '#!/bin/sh' 'exec perl "'"$SCRIPT_PATH"'" "$@"' > "$TARGET_DIR/latexindent"
        chmod +x "$TARGET_DIR/latexindent"
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: '20'
    - run: |
        perl -v
        perl -MCwd -e 'print $Cwd::VERSION."\n";'
    - run: |
        latex -v
        latexmk -v
    - run: |
        npm ci
        npm run compile
    - name: Run tests
      run: npm run test:ci
    - name: Archive test logs
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
        name: test-log
        path: test/log/**/*.log
