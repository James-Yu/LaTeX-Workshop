name: 'Lock Threads'

on:
  schedule:
    # avoid rate limit at 00:00 everyday
    - cron: '37 2 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: lock

jobs:
  action:
    runs-on: ubuntu-latest
    steps:
      - uses: dessant/lock-threads@7266a7ce5c1df01b1c6db85bf8cd86c737dadbe7 # v6
        with:
          issue-inactive-days: '30'
          pr-inactive-days: '30'
          process-only: 'issues, prs'
          log-output: true
