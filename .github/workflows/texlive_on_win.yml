name: TeX Live on Windows
env:
  cache-version: v12
  TEXLIVE_KEY_FINGERPRINT: C78B82D8C79512F79CC0D7C80D5E5D9106BAB6BC
on: [push, pull_request]

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
    - name: Prepare git
      run: git config --global core.autocrlf false
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Set up PATH
      run: |
        echo "C:\strawberry\c\bin;C:\strawberry\perl\site\bin;C:\strawberry\perl\bin" >> $GITHUB_PATH
        echo "D:\texlive\bin\windows" >> $GITHUB_PATH
      shell: bash
    - name: Cache TeX Live
      id: cache-texlive
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
      with:
        path: D:\texlive
        key: ${{ env.cache-version }}-${{ runner.os }}-texlive-essential
        restore-keys: |
          ${{ env.cache-version }}-${{ runner.os }}-texlive-essential
    - name: Download install-tl.zip
      run: |
        curl.exe --fail --show-error --silent --location --proto "=https" --tlsv1.2 -O https://mirror.ctan.org/systems/texlive/tlnet/install-tl.zip
        curl.exe --fail --show-error --silent --location --proto "=https" --tlsv1.2 -O https://mirror.ctan.org/systems/texlive/tlnet/install-tl.zip.sha512
        curl.exe --fail --show-error --silent --location --proto "=https" --tlsv1.2 -O https://mirror.ctan.org/systems/texlive/tlnet/install-tl.zip.sha512.asc
        curl.exe --fail --show-error --silent --location --proto "=https" --tlsv1.2 -O https://tug.org/texlive/files/texlive.asc
        test "$(gpg --show-keys --with-colons texlive.asc | awk -F: '/^fpr:/ {print $10; exit}')" = "$TEXLIVE_KEY_FINGERPRINT"
        sha512sum --check install-tl.zip.sha512
        export GNUPGHOME="$(mktemp -d)"
        gpg --batch --import texlive.asc
        gpg --batch --verify install-tl.zip.sha512.asc install-tl.zip.sha512
        unzip -q install-tl.zip
        mv install-tl-2* install-tl-dir
        rm -rf "$GNUPGHOME"
      if: steps.cache-texlive.outputs.cache-hit != 'true'
      shell: bash
    - name: Run install-tl-windows.bat
      run: |
        install-tl-dir\install-tl-windows.bat --profile test\config\texlive_windows.profile
      if: steps.cache-texlive.outputs.cache-hit != 'true'
      shell: cmd
    - name: Run tlmgr install
      run: |
        tlmgr install collection-latex
        tlmgr install import subfiles latexmk makeindex
        tlmgr install chktex lacheck latexindent
      if: steps.cache-texlive.outputs.cache-hit != 'true'
    - name: Create latexindent wrapper
      run: |
        $script = & kpsewhich latexindent.pl
        if (-not $script) { throw 'latexindent.pl not found via kpsewhich' }
        @(
          '@echo off',
          'perl "' + $script + '" %*'
        ) | Set-Content -Path 'D:\texlive\bin\windows\latexindent.bat' -Encoding ASCII
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: '20'
    - run: |
        perl -v
        perl -MCwd -e 'print $Cwd::VERSION."\n";'
    - run: |
        latex -v
        latexmk -v
    - run: |
        npm ci
        npm run compile
    - name: Run tests
      run: npm run test
    - name: Archive test logs
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
        name: test-log
        path: test/log/**/*.log
